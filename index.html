<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta http-equiv="refresh" content="300">

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>실적개선 모니터</title>
<style>
:root{--bg:#F4F6F8;--card:#FFF;--text:#191F28;--sub:#8B95A1;--line:#E5E8EB;
--primary:#3182F6;--up:#2BB673;--upweak:#D6F5E8;--uptext:#0E9A62;--down:#F04452;
--downweak:#FFE2E5;--live:#FF9500;--liveweak:#FFF1DC;
--font-sans:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo",sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#101013;--card:#17171C;--text:#E5E8EB;
--sub:#8B95A1;--line:#2C2C35;--up:#2BD98E;--upweak:#123527;--uptext:#2BD98E;
--down:#FF5A6A;--downweak:#3A1A1E;--live:#FF9F0A;--liveweak:#3A2C12}}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);line-height:1.6;padding:28px 20px 60px}
.wrap{max-width:1040px;margin:0 auto}
h1{font-size:22px;font-weight:800;letter-spacing:-.02em;line-height:1}
header{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:6px}
header .sub{color:var(--sub);font-size:13px}
.gen{color:var(--sub);font-size:12px;margin-bottom:20px}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px}
.tile b{display:block;font-size:24px;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.tile span{font-size:12px;color:var(--sub)}
.tile.a b{color:var(--uptext)}.tile.p b{color:var(--live)}.tile.e b{color:var(--down)}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.pill{border:1px solid var(--line);background:var(--card);color:var(--sub);border-radius:999px;
padding:6px 14px;font-size:13px;cursor:pointer;font-family:inherit}
.pill.on{background:var(--primary);border-color:var(--primary);color:#fff}
input.pill{cursor:text;color:var(--text);min-width:180px}
input.pill::placeholder{color:var(--sub)}
.day{margin:22px 0 8px;font-size:13px;color:var(--sub);font-weight:600}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:8px}
.row1{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.corp{font-weight:700;font-size:15px;text-decoration:none;color:var(--text)}
.corp:hover{color:var(--primary)}
.code,.meta{color:var(--sub);font-size:12px;font-variant-numeric:tabular-nums}
.badge{margin-left:auto;font-size:12px;font-weight:600;border-radius:999px;padding:3px 10px;white-space:nowrap}
.b-alerted{background:var(--upweak);color:var(--uptext)}
.b-dropped{background:var(--line);color:var(--sub)}
.b-pending{background:var(--liveweak);color:var(--live)}
.b-error{background:var(--downweak);color:var(--down)}
.bases{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.chip{border:1px solid var(--line);border-radius:10px;padding:5px 10px;font-size:12px;
font-variant-numeric:tabular-nums;color:var(--sub)}
.chip.hit{border-color:var(--up);background:var(--upweak);color:var(--uptext)}
.chip b{font-weight:700;color:inherit}
.pos{color:var(--uptext)}.neg{color:var(--down)}
.empty{color:var(--sub);text-align:center;padding:48px 0}
.livedot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--live);
margin-right:5px;vertical-align:1px;animation:blink 1.6s infinite}
@keyframes blink{50%{opacity:.25}}
</style></head><body><div class="wrap">
<header>
 <h1>📈 실적개선 모니터</h1>
 <span class="sub">성장 + GPM 개선 · 수주잔고</span>
</header>
<div class="gen"><span class="livedot"></span>생성 2026-07-23 13:00 · 매시간 스캔 · 이 페이지는 5분마다 자동 새로고침</div>
<div class="tiles">
 <div class="tile"><b id="t-all">0</b><span>스캔한 공시</span></div>
 <div class="tile a"><b id="t-alerted">0</b><span>✅ 알림</span></div>
 <div class="tile"><b id="t-dropped">0</b><span>드랍 (조건 미충족)</span></div>
 <div class="tile p"><b id="t-pending">0</b><span>재무 데이터 대기</span></div>
 <div class="tile e"><b id="t-error">0</b><span>오류</span></div>
</div>
<div class="bar" id="filters">
 <button class="pill on" data-f="all">전체</button>
 <button class="pill" data-f="alerted">✅ 알림</button>
 <button class="pill" data-f="dropped">드랍</button>
 <button class="pill" data-f="pending">대기</button>
 <button class="pill" data-f="error">오류</button>
 <input class="pill" id="q" placeholder="기업명 검색">
</div>
<div id="list"></div>
</div><script>

esults": []}, "20260721001105": {"rcept_no": "20260721001105", "corp": "에프엔씨엔터", "stock": "173940", "market": "K", "report": "[기재정정]사업보고서 (2025.12)", "rcept_dt": "20260721", "ts": "2026-07-23 13:00", "fs": "", "status": "pending", "reason": "재무 데이터 대기", "results": []}, "20260721001043": {"rcept_no": "20260721001043", "corp": "미래에셋생명", "stock": "085620", "market": "Y", "report": "[기재정정]사업보고서 (2025.12)", "rcept_dt": "20260721", "ts": "2026-07-23 13:00", "fs": "", "status": "pending", "reason": "재무 데이터 대기", "results": []}, "20260721000833": {"rcept_no": "20260721000833", "corp": "알파AI", "stock": "043100", "market": "K", "report": "[기재정정]사업보고서 (2025.12)", "rcept_dt": "20260721", "ts": "2026-07-23 13:00", "fs": "", "status": "pending", "reason": "재무 데이터 대기", "results": []}};
const LABEL = {alerted:"✅ 알림", dropped:"드랍", pending:"⏳ 대기", error:"오류"};
const MARKET = {Y:"KOSPI", K:"KOSDAQ"};
let filter = "all", q = "";
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function pct(v,s){return v==null?"n/a":(v>0?"+":"")+v.toFixed(1)+(s||"%")}
function cls(v){return v==null?"":(v>0?"pos":v<0?"neg":"")}
function chip(r){
 return `<span class="chip ${r.pass?"hit":""}">${esc(r.label)} · 매출 <b class="${cls(r.rev_g)}">${pct(r.rev_g)}</b> · 영업이익 <b class="${cls(r.op_g)}">${pct(r.op_g)}</b> · GPM ${r.gpm_p.toFixed(1)}→${r.gpm_c.toFixed(1)} <b class="${cls(r.gpm_d)}">(${pct(r.gpm_d,"%p")})</b></span>`}
function bkchip(bk){
 const uk = v => (v/1e8).toLocaleString(undefined,{maximumFractionDigits:0});
 return `<span class="chip ${bk.pass?"hit":""}">📦 수주잔고(${esc(bk.basis||"직전보고서 대비")}) · ${uk(bk.prev)}억 → ${uk(bk.cur)}억 <b class="${cls(bk.growth)}">(${pct(bk.growth)})</b></span>`}
function card(h){
 const dart = "https://dart.fss.or.kr/dsaf001/main.do?rcpNo=" + h.rcept_no;
 const reason = h.reason ? ` · ${esc(h.reason)}` : "";
 const chips = (h.results||[]).map(chip).join("") + (h.backlog?bkchip(h.backlog):"");
 return `<div class="card"><div class="row1">
  <a class="corp" href="${dart}" target="_blank">${esc(h.corp)}</a>
  <span class="code">${esc(h.stock)} ${MARKET[h.market]||""}</span>
  <span class="meta">${esc(h.report)}${h.fs?" · "+esc(h.fs):""}${h.mcap?" · 시총 "+(h.mcap/1e8).toLocaleString(undefined,{maximumFractionDigits:0})+"억":""} · 확인 ${esc(h.ts)}</span>
  <span class="badge b-${h.status}">${LABEL[h.status]||h.status}${h.status!=="alerted"?reason:""}</span>
 </div>${chips?`<div class="bases">${chips}</div>`:""}</div>`}
function render(){
 const rows = Object.values(DATA)
  .filter(h => filter==="all" || h.status===filter)
  .filter(h => !q || h.corp.toLowerCase().includes(q))
  .sort((a,b) => (b.rcept_dt+b.ts).localeCompare(a.rcept_dt+a.ts));
 const all = Object.values(DATA);
 for (const s of ["alerted","dropped","pending","error"])
  document.getElementById("t-"+s).textContent = all.filter(h=>h.status===s).length;
 document.getElementById("t-all").textContent = all.length;
 let html = "", day = "";
 for (const h of rows){
  const d = h.rcept_dt ? `${h.rcept_dt.slice(0,4)}.${h.rcept_dt.slice(4,6)}.${h.rcept_dt.slice(6,8)}` : "날짜미상";
  if (d !== day){ day = d; html += `<div class="day">${d} 공시</div>`; }
  html += card(h);
 }
 document.getElementById("list").innerHTML = html || `<div class="empty">표시할 공시가 없습니다</div>`;
}
document.getElementById("filters").addEventListener("click", e=>{
 if(!e.target.dataset.f) return;
 filter = e.target.dataset.f;
 document.querySelectorAll("#filters .pill[data-f]").forEach(b=>b.classList.toggle("on", b.dataset.f===filter));
 render();
});
document.getElementById("q").addEventListener("input", e=>{q=e.target.value.trim().toLowerCase();render()});
render();
</script></body></html>
